[UKIProfile]
Profile=
        ID=ipe
        TITLE=Boot with IPE LSM enforcement

Cmdline=
        root=dissect
        mount.usr=dissect
        systemd.verity_usr_options=root-hash-signature=auto
        rw
        audit=0
        systemd.image_policy=esp=unprotected:xbootldr=unprotected+unused+absent:usr=signed:root=encrypted+absent:swap=encrypted+unused+absent:home=unprotected+absent:=ignore
        systemd.image_filter=usr=Ubuntu_*:usr-verity=Ubuntu_*:usr-verity-sig=Ubuntu_*:root=Ubuntu-*:swap=Ubuntu-*:home=Ubuntu-*
        ipe.enforce=1

SignExpectedPcr=yes
