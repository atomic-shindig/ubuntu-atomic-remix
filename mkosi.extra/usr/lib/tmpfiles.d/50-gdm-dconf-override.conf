# Override the upstream L?/etc.conf rules for /etc/gdm and /etc/dconf.
# Upstream symlinks these into /usr so package updates propagate, but
# GDM/dconf need to write real state here (e.g. compiled system db,
# custom.conf edits), so we make them real directories instead,
# seeded once from /usr/share/factory/etc on first boot.
C /etc/gdm3      - - - - -
C /etc/dconf     - - - - -
d       /tmp/.X11-unix  1777  root  root   -    -
